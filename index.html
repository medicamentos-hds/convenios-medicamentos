<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Convenios de Medicamentos</title>
<link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <div id="pantalla-login" class="login-pantalla">
    <form id="form-login" class="login-form">
      <img src="assets/logo-web-300x86.png" alt="Logo HDS" class="logo-login">
      <h2>Iniciar sesión</h2>
      <label>Usuario
        <input type="text" id="login-usuario" autocomplete="username" required>
      </label>
      <label>Contraseña
        <input type="password" id="login-password" autocomplete="current-password" required>
      </label>
      <button type="submit">Ingresar</button>
      <p id="login-mensaje" class="mensaje"></p>
    </form>
  </div>

  <div id="app" class="oculto">
    <header>
      <div class="header-top">
        <h1>Convenios de Medicamentos</h1>
        <div class="header-acciones">
          <img src="assets/logo-web-300x86.png" alt="Logo HDS" class="logo-header">
          <button type="button" id="btn-logout" class="logout-btn">Cerrar sesión</button>
        </div>
      </div>
      <nav class="tabs">
        <button class="tab-btn active" data-tab="buscar">Búsqueda</button>
        <button class="tab-btn" data-tab="ingresar-medicamento">Ingresar Medicamento</button>
        <button class="tab-btn" data-tab="ingresar-convenio-act">Ingresar Convenio Vigente</button>
        <button class="tab-btn" data-tab="ingresar-convenio-nuevo">Ingresar Convenio Nuevo</button>
      </nav>
    </header>

  <main>
    <!-- BUSCAR -->
    <section id="buscar" class="tab-panel active">
      <h2>Buscar Medicamento</h2>
      <form id="form-buscar" class="inline-form">
        <div class="fila-buscar">
          <input type="text" id="buscar-texto" placeholder="Nombre o código del medicamento...">
          <input type="text" id="buscar-convenio" placeholder="ID convenio (vigente o nuevo)...">
        </div>
        <div class="fila-buscar">
          <label class="campo-buscar-anio">Año Ingreso Medicamento
            <input type="number" id="buscar-anio" placeholder="Año..." min="2000" max="2100">
          </label>
        </div>
        <div class="fila-buscar" style="justify-content: right;">
          <button type="submit">Buscar</button>
          <button type="button" id="btn-limpiar">Limpiar</button>
        </div>
      </form>
      <div class="fila-buscar-acciones">
        <p id="buscar-mensaje" class="mensaje"></p>
        <button type="button" id="btn-descargar-pdf" class="btn-pdf oculto">Descargar Resultados en PDF</button>
      </div>
      <div id="resultados"></div>
    </section>

    <!-- INGRESAR MEDICAMENTO -->
    <section id="ingresar-medicamento" class="tab-panel">
      <h2>Ingresar Medicamento</h2>
      <form id="form-medicamento" class="data-form">
        <label>Nombre Medicamento
          <input type="text" name="nombre_med" required>
        </label>
        <label>Código Medicamento
          <input type="text" inputmode="numeric" class="solo-digitos" name="codigo_med">
        </label>
        <label><span id="label-consumo-ant-2">Consumo Año Anterior 2</span>
          <input type="text" inputmode="numeric" class="miles" name="consumo_ant_2" value="0">
        </label>
        <label><span id="label-consumo-ant-1">Consumo Año Anterior 1</span>
          <input type="text" inputmode="numeric" class="miles" name="consumo_ant_1" value="0">
        </label>
        <label><span id="label-consumo-actual">Consumo Año Actual</span>
          <input type="text" inputmode="numeric" class="miles" name="consumo_actual" required>
        </label>
        <label>Promedio Reposición (últimos 3 meses)
          <input type="text" inputmode="numeric" class="miles" name="prom_repo" required>
        </label>
        <label>Consumo Proyectado Año Actual
          <input type="text" inputmode="numeric" class="miles" name="consumo_proy" id="input-consumo-proy" readonly disabled>
        </label>
        <label class="campo-completo">Observaciones
          <textarea name="observaciones" rows="3"></textarea>
        </label>
        <div class="fila-acciones-form">
          <button type="submit">Guardar Medicamento</button>
          <button type="button" id="btn-limpiar-medicamento">Limpiar</button>
        </div>
      </form>
      <p id="medicamento-mensaje" class="mensaje"></p>
    </section>

    <!-- INGRESAR CONVENIO ACTUAL -->
    <section id="ingresar-convenio-act" class="tab-panel">
      <h2>Ingresar Convenio Vigente</h2>
      <form id="form-convenio-act" class="data-form" data-tabla="convenio_act">
        <label>Medicamento
          <select name="id_medicamento" required></select>
        </label>
        <label>ID Convenio
          <input type="text" name="id_convenio" required>
        </label>
        <label>Proveedor
          <select name="id_proveedor" class="select-proveedor" required></select>
        </label>
        <label class="campo-nuevo-proveedor oculto">Nombre nuevo proveedor
          <input type="text" class="input-nuevo-proveedor" required>
        </label>
        <label>Cantidad
          <input type="text" inputmode="numeric" class="miles" name="cantidad" required>
        </label>
        <label>Precio Unitario Neto
          <span class="campo-moneda">
            <span class="simbolo-moneda">$</span>
            <input type="text" inputmode="numeric" class="miles" name="precio_unit_neto" required>
          </span>
        </label>
        <label>Duración (meses)
          <input type="text" inputmode="numeric" class="miles" name="duracion_meses" required>
        </label>
        <label>Precio Total Convenio
          <span class="campo-moneda">
            <span class="simbolo-moneda">$</span>
            <input type="text" inputmode="numeric" class="miles" name="precio_total_conv" readonly disabled>
          </span>
        </label>
        <label>Precio Anual Convenio
          <span class="campo-moneda">
            <span class="simbolo-moneda">$</span>
            <input type="text" inputmode="numeric" class="miles" name="precio_anual_conv" readonly disabled>
          </span>
        </label>
        <div class="fila-acciones-form">
          <button type="submit">Guardar Convenio Vigente</button>
          <button type="button" class="btn-limpiar-convenio">Limpiar</button>
        </div>
      </form>
      <p id="convenio-act-mensaje" class="mensaje"></p>
    </section>

    <!-- INGRESAR CONVENIO NUEVO -->
    <section id="ingresar-convenio-nuevo" class="tab-panel">
      <h2>Ingresar Convenio Nuevo</h2>
      <form id="form-convenio-nuevo" class="data-form" data-tabla="convenio_nuevo">
        <label>Medicamento
          <select name="id_medicamento" required></select>
        </label>
        <label>ID Convenio
          <input type="text" name="id_convenio" required>
        </label>
        <label>Proveedor
          <select name="id_proveedor" class="select-proveedor" required></select>
        </label>
        <label class="campo-nuevo-proveedor oculto">Nombre nuevo proveedor
          <input type="text" class="input-nuevo-proveedor" required>
        </label>
        <label>Cantidad
          <input type="text" inputmode="numeric" class="miles" name="cantidad" required>
        </label>
        <label>Precio Unitario Neto
          <span class="campo-moneda">
            <span class="simbolo-moneda">$</span>
            <input type="text" inputmode="numeric" class="miles" name="precio_unit_neto" required>
          </span>
        </label>
        <label>Duración (meses)
          <input type="text" inputmode="numeric" class="miles" name="duracion_meses" required>
        </label>
        <label>Precio Total Convenio
          <span class="campo-moneda">
            <span class="simbolo-moneda">$</span>
            <input type="text" inputmode="numeric" class="miles" name="precio_total_conv" readonly disabled>
          </span>
        </label>
        <label>Precio Anual Convenio
          <span class="campo-moneda">
            <span class="simbolo-moneda">$</span>
            <input type="text" inputmode="numeric" class="miles" name="precio_anual_conv" readonly disabled>
          </span>
        </label>
        <div class="fila-acciones-form">
          <button type="submit">Guardar Convenio Nuevo</button>
          <button type="button" class="btn-limpiar-convenio">Limpiar</button>
        </div>
      </form>
      <p id="convenio-nuevo-mensaje" class="mensaje"></p>
    </section>
  </main>
  </div>

  <div id="modal-editar-medicamento" class="modal-overlay oculto">
    <div class="modal-contenido">
      <h3>Editar Medicamento</h3>
      <form id="form-editar-medicamento" class="data-form">
        <input type="hidden" name="id">
        <label><span id="label-editar-consumo-ant-2">Consumo Año Anterior 2</span>
          <input type="text" inputmode="numeric" class="miles" name="consumo_ant_2">
        </label>
        <label><span id="label-editar-consumo-ant-1">Consumo Año Anterior 1</span>
          <input type="text" inputmode="numeric" class="miles" name="consumo_ant_1">
        </label>
        <label class="campo-completo">Observaciones
          <textarea name="observaciones" rows="3"></textarea>
        </label>
        <div class="modal-acciones">
          <button type="button" id="btn-cancelar-editar">Cancelar</button>
          <button type="submit">Guardar Cambios</button>
        </div>
      </form>
      <p id="editar-medicamento-mensaje" class="mensaje"></p>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="js/config.js"></script>
  <script src="js/supabaseClient.js"></script>
  <script src="js/app.js"></script>
  <script src="js/auth.js"></script>
</body>
</html>
